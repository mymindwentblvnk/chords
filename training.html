<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chordz">
    <title>Training Mode - Chordz</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="guide-styles.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="nav-link">🎤 Find Note</a>
        <a href="chord-progressions.html" class="nav-link">🎵 Chord Progressions</a>
        <a href="training.html" class="nav-link active">🎮 Training</a>
        <a href="wiki.html" class="nav-link">📚 Wiki</a>
    </nav>

    <div class="guide-container">
        <div class="guide-section" style="max-width: 600px; margin: 0 auto; padding: 20px;">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 30px;">🔄 Chord Inversion Training</h2>

                <select id="training-chord" style="width: 100%; padding: 15px; font-size: 1.1rem; background: var(--background); color: var(--text-primary); border: 2px solid var(--primary-color); border-radius: 10px; cursor: pointer; margin-bottom: 20px;">
                    <option value="C">C Major</option>
                    <option value="D">D Major</option>
                    <option value="E">E Major</option>
                    <option value="F">F Major</option>
                    <option value="G">G Major</option>
                    <option value="A">A Major</option>
                    <option value="B">B Major</option>
                    <option value="Am">A Minor</option>
                    <option value="Bm">B Minor</option>
                    <option value="Cm">C Minor</option>
                    <option value="Dm">D Minor</option>
                    <option value="Em">E Minor</option>
                    <option value="Fm">F Minor</option>
                    <option value="Gm">G Minor</option>
                </select>

                <button id="start-training" style="width: 100%; padding: 18px; font-size: 1.2rem; font-weight: 600; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 30px;">
                    🎤 Start Training
                </button>

                <button id="stop-training" style="width: 100%; padding: 18px; font-size: 1.2rem; font-weight: 600; background: #ef4444; color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 30px; display: none;">
                    ⏹ Stop Training
                </button>

                <!-- Sequence Boxes -->
                <div id="sequence-boxes" style="display: flex; flex-direction: column; gap: 15px;">
                    <!-- Boxes will be generated dynamically -->
                </div>

                <div id="success-message" style="display: none; text-align: center; padding: 30px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2)); border-radius: 15px; border: 3px solid var(--accent-happy); margin-top: 30px;">
                    <div style="font-size: 4rem; margin-bottom: 15px;">🎉</div>
                    <h2 style="color: var(--accent-happy); margin: 0 0 10px 0;">Perfect!</h2>
                    <p style="font-size: 1.2rem; color: var(--text-primary); margin: 0;">You've mastered all inversions!</p>
                </div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
    <script src="pitch-detector.js"></script>
    <script>
        // Chord definitions (root, third, fifth)
        // Using sharp notation to match pitch detector output
        const CHORDS = {
            'C': ['C', 'E', 'G'],
            'D': ['D', 'F#', 'A'],
            'E': ['E', 'G#', 'B'],
            'F': ['F', 'A', 'C'],
            'G': ['G', 'B', 'D'],
            'A': ['A', 'C#', 'E'],
            'B': ['B', 'D#', 'F#'],
            'Am': ['A', 'C', 'E'],
            'Bm': ['B', 'D', 'F#'],
            'Cm': ['C', 'D#', 'G'],
            'Dm': ['D', 'F', 'A'],
            'Em': ['E', 'G', 'B'],
            'Fm': ['F', 'G#', 'C'],
            'Gm': ['G', 'A#', 'D']
        };

        class InversionTrainer {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                this.mediaStream = null;
                this.isRunning = false;
                this.currentChord = 'C';
                this.currentSequenceIndex = 0;
                this.currentNoteIndex = 0;
                this.sequences = [];
                this.synth = null;
                this.lastDetectedNote = null;
                this.detectionCooldown = false;
                this.lastFrequency = null;
                this.stableCount = 0;
                this.wakeLock = null;
                this.wrongNoteTimeout = null; // Track timeout for wrong note fade

                this.init();
            }

            init() {
                const startBtn = document.getElementById('start-training');
                const stopBtn = document.getElementById('stop-training');
                const chordSelect = document.getElementById('training-chord');

                startBtn.addEventListener('click', () => this.start());
                stopBtn.addEventListener('click', () => this.stop());
                chordSelect.addEventListener('change', (e) => {
                    this.currentChord = e.target.value;
                    this.updateSequenceBoxes();
                });

                // Initialize Tone.js synth for success sound
                if (typeof Tone !== 'undefined') {
                    this.synth = new Tone.PolySynth(Tone.Synth).toDestination();
                }

                // Show sequence boxes on page load
                this.updateSequenceBoxes();
            }

            updateSequenceBoxes() {
                this.sequences = this.generateSequences();
                this.currentSequenceIndex = 0;
                this.currentNoteIndex = 0;
                this.createSequenceBoxes();
            }

            createSequenceBoxes() {
                const container = document.getElementById('sequence-boxes');
                container.innerHTML = '';

                this.sequences.forEach((sequence, index) => {
                    const box = document.createElement('div');
                    box.id = `sequence-box-${index}`;
                    box.style.cssText = `
                        padding: 20px;
                        background: var(--surface);
                        border: 3px solid var(--surface-light);
                        border-radius: 10px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 15px;
                        position: relative;
                        min-height: 80px;
                        transition: all 0.3s ease;
                    `;

                    // Create note badges
                    sequence.forEach((note, noteIndex) => {
                        const noteBadge = document.createElement('div');
                        noteBadge.id = `note-${index}-${noteIndex}`;
                        noteBadge.textContent = note;
                        noteBadge.style.cssText = `
                            padding: 12px 20px;
                            background: var(--background);
                            color: var(--text-primary);
                            border-radius: 8px;
                            font-weight: bold;
                            font-size: 1.3rem;
                            font-family: 'Courier New', monospace;
                            transition: all 0.3s ease;
                        `;
                        box.appendChild(noteBadge);
                    });

                    // Create wrong note placeholder
                    const wrongNoteContainer = document.createElement('div');
                    wrongNoteContainer.id = `wrong-note-${index}`;
                    wrongNoteContainer.style.cssText = `
                        position: absolute;
                        right: 15px;
                        top: 50%;
                        transform: translateY(-50%);
                        padding: 10px 16px;
                        background: #ef4444;
                        color: white;
                        border-radius: 8px;
                        font-weight: bold;
                        font-size: 1.1rem;
                        font-family: 'Courier New', monospace;
                        opacity: 0;
                        transition: opacity 0.3s ease;
                    `;
                    box.appendChild(wrongNoteContainer);

                    container.appendChild(box);
                });
            }

            generateSequences() {
                const notes = CHORDS[this.currentChord];
                if (!notes) return [];

                const [root, third, fifth] = notes;

                // All 6 sequences: up and down for each inversion
                return [
                    [root, third, fifth],  // Root position up: CEG
                    [third, fifth, root],  // 1st inversion up: EGC
                    [fifth, root, third],  // 2nd inversion up: GCE
                    [third, root, fifth],  // Root position down: ECG
                    [root, fifth, third],  // 1st inversion down: CGE
                    [fifth, third, root]   // 2nd inversion down: GEC
                ];
            }

            async start() {
                try {
                    // Reset progress
                    this.currentSequenceIndex = 0;
                    this.currentNoteIndex = 0;
                    this.updateSequenceBoxes();

                    // Start Tone.js context
                    if (this.synth) {
                        await Tone.start();
                    }

                    // Request microphone access
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            autoGainControl: false,
                            noiseSuppression: false
                        }
                    });

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 8192;
                    this.analyser.smoothingTimeConstant = 0.3;

                    this.microphone = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.microphone.connect(this.analyser);

                    this.isRunning = true;
                    this.updateUI();
                    this.detect();

                    // Request wake lock to keep screen awake
                    await this.requestWakeLock();

                    // Update UI
                    document.getElementById('start-training').style.display = 'none';
                    document.getElementById('stop-training').style.display = 'block';
                    document.getElementById('success-message').style.display = 'none';
                } catch (error) {
                    alert('Error accessing microphone: ' + error.message);
                }
            }

            stop() {
                this.isRunning = false;

                // Release wake lock to allow screen to sleep
                this.releaseWakeLock();

                if (this.microphone) {
                    this.microphone.disconnect();
                    this.microphone = null;
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }

                // Clear boxes
                document.getElementById('sequence-boxes').innerHTML = '';

                document.getElementById('start-training').style.display = 'block';
                document.getElementById('stop-training').style.display = 'none';
            }

            detect() {
                if (!this.isRunning) return;

                const buffer = new Float32Array(this.analyser.fftSize);
                this.analyser.getFloatTimeDomainData(buffer);

                const result = this.detectPitch(buffer);

                if (result && result.frequency && result.confidence > 0.9) {
                    const note = this.frequencyToNote(result.frequency);
                    if (note) {
                        this.handleDetectedNote(note);
                    }
                }

                requestAnimationFrame(() => this.detect());
            }

            detectPitch(buffer) {
                const rms = PitchDetector.calculateRMS(buffer);
                // Adaptive threshold based on signal strength
                if (rms < 0.01) {
                    return null;
                }

                const autocorrelation = PitchDetector.autoCorrelate(buffer, this.audioContext.sampleRate);
                if (!autocorrelation) {
                    return null;
                }

                let { frequency, confidence } = autocorrelation;

                if (frequency < 80 || frequency > 1200 || confidence < 0.90) {
                    return null;
                }

                // Temporal smoothing - only accept stable frequencies
                if (this.lastFrequency) {
                    const freqDiff = Math.abs(frequency - this.lastFrequency);
                    const tolerance = this.lastFrequency * 0.02; // 2% tolerance

                    if (freqDiff < tolerance) {
                        this.stableCount++;
                        // Average with last frequency for smoother output
                        frequency = (frequency + this.lastFrequency) / 2;
                    } else {
                        this.stableCount = 0;
                    }
                }

                this.lastFrequency = frequency;

                // Only return if frequency has been stable for at least 2 frames
                if (this.stableCount < 2) {
                    return null;
                }

                return { frequency, confidence };
            }

            frequencyToNote(frequency) {
                return PitchDetector.frequencyToNote(frequency);
            }

            async requestWakeLock() {
                if (!('wakeLock' in navigator)) {
                    console.warn('Screen Wake Lock API not supported');
                    return;
                }

                try {
                    this.wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock activated');

                    this.wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock released');
                    });
                } catch (err) {
                    console.error('Wake Lock request failed:', err);
                }
            }

            async releaseWakeLock() {
                if (this.wakeLock !== null) {
                    try {
                        await this.wakeLock.release();
                        this.wakeLock = null;
                        console.log('Wake Lock manually released');
                    } catch (err) {
                        console.error('Wake Lock release failed:', err);
                    }
                }
            }

            handleDetectedNote(note) {
                // Cooldown to prevent multiple detections of same note
                if (this.detectionCooldown || note === this.lastDetectedNote) {
                    return;
                }

                const currentSequence = this.sequences[this.currentSequenceIndex];
                const expectedNote = currentSequence[this.currentNoteIndex];

                // Check if it's the correct note
                if (note === expectedNote) {
                    this.lastDetectedNote = note;
                    this.detectionCooldown = true;

                    // Turn note green
                    const noteBadge = document.getElementById(`note-${this.currentSequenceIndex}-${this.currentNoteIndex}`);
                    if (noteBadge) {
                        noteBadge.style.background = 'var(--accent-happy)';
                        noteBadge.style.color = 'white';
                    }

                    // Move to next note
                    this.currentNoteIndex++;

                    // Check if sequence is complete
                    if (this.currentNoteIndex >= currentSequence.length) {
                        this.currentSequenceIndex++;
                        this.currentNoteIndex = 0;

                        // Check if all sequences are complete
                        if (this.currentSequenceIndex >= this.sequences.length) {
                            this.showSuccess();
                        } else {
                            this.updateUI();
                        }
                    } else {
                        this.updateUI();
                    }

                    // Reset cooldown after delay
                    setTimeout(() => {
                        this.detectionCooldown = false;
                        this.lastDetectedNote = null;
                    }, 500);
                } else {
                    // Wrong note - show in red next to current box
                    this.showWrongNote(note);
                }
            }

            showWrongNote(note) {
                // Clear previous timeout
                if (this.wrongNoteTimeout) {
                    clearTimeout(this.wrongNoteTimeout);
                }

                const wrongNoteEl = document.getElementById(`wrong-note-${this.currentSequenceIndex}`);
                if (wrongNoteEl) {
                    wrongNoteEl.textContent = note;
                    wrongNoteEl.style.opacity = '1';

                    // Fade out after 2 seconds
                    this.wrongNoteTimeout = setTimeout(() => {
                        wrongNoteEl.style.opacity = '0';
                    }, 2000);
                }
            }

            updateUI() {
                // Highlight current sequence box
                this.sequences.forEach((_, index) => {
                    const box = document.getElementById(`sequence-box-${index}`);
                    if (box) {
                        if (index === this.currentSequenceIndex) {
                            box.style.borderColor = 'var(--primary-color)';
                            box.style.background = 'rgba(99, 102, 241, 0.1)';
                        } else if (index < this.currentSequenceIndex) {
                            box.style.borderColor = 'var(--accent-happy)';
                            box.style.background = 'rgba(16, 185, 129, 0.1)';
                        } else {
                            box.style.borderColor = 'var(--surface-light)';
                            box.style.background = 'var(--surface)';
                        }
                    }
                });
            }

            async showSuccess() {
                this.isRunning = false;

                document.getElementById('success-message').style.display = 'block';

                // Play success chord
                if (this.synth) {
                    const notes = CHORDS[this.currentChord];
                    await this.synth.triggerAttackRelease(notes.map(n => n + '4'), '1.5');

                    // Play ascending arpeggio
                    setTimeout(() => this.synth.triggerAttackRelease(notes[0] + '4', '0.2'), 100);
                    setTimeout(() => this.synth.triggerAttackRelease(notes[1] + '4', '0.2'), 300);
                    setTimeout(() => this.synth.triggerAttackRelease(notes[2] + '4', '0.2'), 500);
                    setTimeout(() => this.synth.triggerAttackRelease(notes.map(n => n + '5'), '1'), 700);
                }

                // Auto-stop after delay
                setTimeout(() => this.stop(), 5000);
            }
        }

        // Initialize trainer
        const trainer = new InversionTrainer();

        // Add CSS animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: scale(0.8); }
                to { opacity: 1; transform: scale(1); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
